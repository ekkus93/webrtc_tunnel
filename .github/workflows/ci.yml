name: CI

on:
  push:
    branches:
      - master
    tags:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      # Release profile has debug_assertions off, so it catches warnings that the
      # debug --all-targets run misses (e.g. imports used only under
      # cfg(debug_assertions)). No --all-targets here: the integration tests
      # depend on debug-only test hooks and intentionally do not build in release.
      - name: Run clippy (release profile)
        run: cargo clippy --workspace --release --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        # --all-features so optional/feature-gated coverage (e.g. p2p-daemon's
        # sd-notify feature) actually runs in CI, not just under clippy.
        run: cargo test --workspace --all-targets --all-features

      - name: Validate systemd units
        if: runner.os == 'Linux'
        run: scripts/check-systemd-units.sh

      - name: Validate launchd plists
        if: runner.os == 'macOS'
        run: scripts/check-launchd-plists.sh

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK tools
        uses: android-actions/setup-android@v4

      - name: Install Android SDK components
        run: yes | sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264"

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Android Rust JNI libraries
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
        run: cargo ndk -t arm64-v8a -t x86_64 -o android/app/src/main/jniLibs build -p p2p-mobile --release

      - name: Build Android app and run unit tests
        run: |
          cd android
          ./gradlew --no-daemon assembleDebug testDebugUnitTest

  release-artifacts:
    name: Release artifacts (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - test
      - android
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Package release binaries
        shell: bash
        run: |
          artifact_dir="rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}"
          mkdir -p "$artifact_dir"
          cp target/release/p2pctl "$artifact_dir/"
          cp target/release/p2p-offer "$artifact_dir/"
          cp target/release/p2p-answer "$artifact_dir/"
          cp README.md LICENSE "$artifact_dir/"
          tar -czf "${artifact_dir}.tar.gz" "$artifact_dir"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}
          path: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}.tar.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}.tar.gz
          generate_release_notes: true
