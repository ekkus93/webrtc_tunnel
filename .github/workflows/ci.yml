name: CI

on:
  push:
    branches:
      - master
    tags:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets

  release-artifacts:
    name: Release artifacts (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - lint
      - test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Package release binaries
        shell: bash
        run: |
          artifact_dir="rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}"
          mkdir -p "$artifact_dir"
          cp target/release/p2pctl "$artifact_dir/"
          cp target/release/p2p-offer "$artifact_dir/"
          cp target/release/p2p-answer "$artifact_dir/"
          cp README.md LICENSE "$artifact_dir/"
          tar -czf "${artifact_dir}.tar.gz" "$artifact_dir"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}
          path: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}.tar.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: rust_webrtc-${{ github.ref_name }}-${{ matrix.os }}.tar.gz
          generate_release_notes: true
