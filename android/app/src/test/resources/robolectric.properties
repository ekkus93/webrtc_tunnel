# Default to a plain Application for unit tests.
#
# The manifest's WebRtcTunnelApplication runs real app initialization in onCreate(), which
# FIX6 INV-010 made asynchronous (it was previously a main-thread runBlocking that happened
# to finish before @Before ran). Asynchronous initialization races test setup: it writes the
# default config.toml, so a test that deletes config.toml in @Before can have it re-created
# underneath the test body.
#
# Repository/ViewModel unit tests do not want application initialization at all — they build
# their own AppDependencies. Every test that genuinely needs a specific Application already
# declares it explicitly with @Config(application = ...), which overrides this default.
application=android.app.Application
