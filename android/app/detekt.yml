# detekt config. Built on top of detekt's default rules (buildUponDefaultConfig).
# Per CLAUDE.md the no-suppress policy applies: this file does NOT relax/disable
# rules or raise thresholds to make findings disappear — everything is fixed in
# code. The single exception is the unavoidable framework-alignment below.
naming:
  FunctionNaming:
    # Jetpack Compose @Composable functions are PascalCase by official convention;
    # renaming them would be incorrect. Same alignment we apply for ktlint.
    ignoreAnnotated: ['Composable']

# TooGenericExceptionCaught: Flag `catch (e: Throwable)` but allow
# `catch (e: Exception)`. We catch Exception in boundaries where we want to
# propagate CancellationException separately (rethrown first), then catch any
# other error. Catching Throwable would also catch OOM/ControlThrowable, which
# we explicitly do not want to handle.
exceptions:
  TooGenericExceptionCaught:
    # FIX6 Q11: detekt matches the caught type's *simple* name, so the previous
    # `java.lang.Throwable` never matched Kotlin's `kotlin.Throwable` and the rule
    # was silently inert — every `catch (Throwable)` slipped through. Use the
    # simple name `Throwable` so the rule actually flags it while still allowing
    # `catch (Exception)`.
    exceptionNames:
      - Throwable
